# SPDX-License-Identifier: MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Verify lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked

      - name: Verify runtime syntax
        run: uv run python -m compileall -q app.py config.py core adapters

      - name: Build EventKit bridge
        if: runner.os == 'macOS'
        run: scripts/build_calendar_bridge.sh

      - name: Build and test App Store foundation
        if: runner.os == 'macOS'
        run: swift test --package-path native/HobAppFoundation

      - name: Build App Store shell bundle
        if: runner.os == 'macOS'
        run: >-
          xcodebuild
          -project native/HobMacApp/HobMacApp.xcodeproj
          -scheme Hob
          -configuration Debug
          -derivedDataPath "$RUNNER_TEMP/hob-macapp-derived"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Test
        run: uv run pytest
