<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-labelledby="title desc">
  <title id="title">Hob</title>
  <desc id="desc">A brass kettle kept warm on the hob ledge beside the hearth glow, with gently rising steam, next to the Hob wordmark and tagline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b0e08"/>
      <stop offset="1" stop-color="#0e0704"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.6" r="0.62">
      <stop offset="0" stop-color="#ff7a18" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#c43c0a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c43c0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff8a1e" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ff8a1e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kettle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe2a6"/>
      <stop offset="0.42" stop-color="#e7a644"/>
      <stop offset="1" stop-color="#894d1b"/>
    </linearGradient>
    <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d99a3e"/>
      <stop offset="1" stop-color="#7a4014"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="emberBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <filter id="steamBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>

  <!-- scene -->
  <rect x="0" y="0" width="1200" height="380" rx="22" fill="url(#bg)"/>

  <!-- warm hearth glow behind the kettle -->
  <ellipse cx="232" cy="236" rx="210" ry="170" fill="url(#glow)">
    <animate attributeName="rx" values="210;224;210" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- the hob: a stone ledge the kettle is kept warm on -->
  <g>
    <rect x="150" y="306" width="196" height="15" rx="7" fill="#3a241a"/>
    <rect x="150" y="306" width="196" height="6" rx="3" fill="#4d3022"/>
    <ellipse cx="248" cy="306" rx="70" ry="9" fill="url(#emberGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- embers, kept low: the fire holds the kettle warm -->
  <g fill="#ffb24a" filter="url(#emberBlur)">
    <circle cx="214" cy="300" r="2.2">
      <animate attributeName="cy" values="304;258" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="262" cy="302" r="1.8">
      <animate attributeName="cy" values="305;262" dur="2.7s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.7s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- kettle -->
  <g>
    <!-- handle, arched over the lid -->
    <path d="M198,214 C206,172 258,172 266,214" fill="none" stroke="url(#brassDark)"
      stroke-width="9" stroke-linecap="round"/>
    <!-- spout, upper-left -->
    <path d="M196,232 C171,229 154,217 140,197 L151,191 C166,209 184,221 205,223 Z"
      fill="url(#kettle)" stroke="#5e3614" stroke-width="1"/>
    <!-- body -->
    <path d="M186,300 C175,273 176,240 197,219 C205,211 259,211 267,219
             C288,240 289,273 278,300 Z"
      fill="url(#kettle)" stroke="#5e3614" stroke-width="1"/>
    <!-- sheen on the body -->
    <ellipse cx="210" cy="252" rx="12" ry="40" fill="#fff6e2" opacity="0.22"
      transform="rotate(-10 210 252)"/>
    <!-- lid -->
    <ellipse cx="232" cy="216" rx="42" ry="9" fill="url(#brassDark)"/>
    <ellipse cx="232" cy="213" rx="36" ry="6" fill="#f2c777" opacity="0.8"/>
    <!-- knob -->
    <rect x="225" y="199" width="14" height="12" rx="5" fill="url(#brassDark)"/>
    <circle cx="232" cy="199" r="6" fill="#f2c777"/>
  </g>

  <!-- steam, gently rising from the spout: kept warm and ready -->
  <g fill="none" stroke="#f3e6d2" stroke-linecap="round" filter="url(#steamBlur)">
    <path d="M146,188 q-13,-17 -2,-35 q11,-18 -2,-36" stroke-width="5">
      <animate attributeName="opacity" values="0;0.55;0" dur="3.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0,14;0,-28" dur="3.6s" repeatCount="indefinite"/>
    </path>
    <path d="M158,184 q12,-16 1,-33 q-11,-17 1,-34" stroke-width="4">
      <animate attributeName="opacity" values="0;0.45;0" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0,12;0,-30" dur="3s" begin="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M150,182 q-9,-15 0,-30 q9,-15 0,-30" stroke-width="3.2">
      <animate attributeName="opacity" values="0;0.4;0" dur="4.2s" begin="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0,10;0,-34" dur="4.2s" begin="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- wordmark -->
  <g transform="translate(520 0)">
    <text x="0" y="172" font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif" font-size="118" font-weight="700" fill="#f7ead8" letter-spacing="1">Hob</text>
    <text x="4" y="222" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="25" fill="#d8b79b">A realistic day, renegotiated in chat.</text>
    <text x="4" y="270" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="18" fill="#ff9a3c" letter-spacing="1.4">Natural language &#183; Local LLM &#183; launchd &#183; macOS &#183; MIT</text>
  </g>
</svg>
